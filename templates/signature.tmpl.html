<!--
Email signature scaffold for the email-triage meta-skill.
Replace the {{PLACEHOLDERS}} with the user's answers from the signature sub-flow.
Save the rendered file as signature.html alongside the generated SKILL.md.

The signature is rendered as the SECOND block in every drafted reply:
  [reply text] → [SIGNATURE] → [quoted thread]

The signature owns the sign-off ("Cheers,", "Best,", etc.). Reply text should
NEVER contain a sign-off — it would duplicate.
-->

<div style="font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #333; line-height: 1.5;">

<p>{{SIGNATURE_SIGNOFF}},</p>

<p>
<b>{{SIGNATURE_NAME}}</b><br>
{{SIGNATURE_ROLE}}<br>
{{SIGNATURE_BRAND}}
</p>

<!-- BEGIN: signature_contact_block -->
<p>
{{SIGNATURE_PHONE_LINE}}
{{SIGNATURE_EMAIL_LINE}}
{{SIGNATURE_WEBSITE_LINE}}
</p>
<!-- END: signature_contact_block -->

<!-- BEGIN: signature_socials_block -->
<p>
{{SIGNATURE_SOCIALS_LINES}}
</p>
<!-- END: signature_socials_block -->

<!-- BEGIN: signature_disclaimer_block -->
<p style="font-size: 11px; color: #888;">
{{SIGNATURE_DISCLAIMER}}
</p>
<!-- END: signature_disclaimer_block -->

</div>
